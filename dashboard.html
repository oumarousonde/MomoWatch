<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MomoWatch — Tableau de bord</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #FF7900;
    --noir: #0E0E0E;
    --gf: #1A1A1A;
    --gm: #2A2A2A;
    --gt: #9A9A9A;
    --blanc: #FFFFFF;
    --vert: #4CAF50;
    --rouge: #F44336;
  }
  body { font-family: 'Inter', sans-serif; background: var(--noir); color: var(--blanc); min-height: 100vh; }

  nav {
    background: var(--gf); border-bottom: 1px solid #222;
    padding: 14px 20px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .nav-logo img { height: 32px; }
  .nav-titre { font-size: 16px; font-weight: 800; }
  .nav-titre span { color: var(--orange); }
  .statut { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gt); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--vert); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .page { max-width: 680px; margin: 0 auto; padding: 16px; }

  /* STATS */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat { background: var(--gf); border: 1px solid #222; border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 11px; color: var(--gt); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-val { font-size: 20px; font-weight: 800; color: var(--orange); }
  .stat-nb { font-size: 11px; color: var(--gt); margin-top: 4px; }

  /* FILTRES */
  .filtres { background: var(--gf); border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .f-titre { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 12px; }
  .f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .f-champ { display: flex; flex-direction: column; gap: 4px; }
  .f-champ label { font-size: 11px; color: var(--gt); }
  .f-champ select, .f-champ input {
    background: #111; border: 1px solid #333; border-radius: 8px;
    padding: 9px 12px; color: var(--blanc); font-size: 13px;
    font-family: 'Inter', sans-serif; width: 100%;
  }
  .f-op { display: flex; gap: 6px; }
  .f-op select { flex: 1; }
  .btn-plus {
    background: var(--gm); color: var(--orange); border: 1px solid #333;
    border-radius: 8px; padding: 9px 13px; font-size: 16px; cursor: pointer;
  }
  .btn-voir {
    width: 100%; background: var(--orange); color: var(--blanc);
    border: none; border-radius: 8px; padding: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .btn-voir:active { opacity: 0.85; }

  /* LISTE */
  .liste-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .liste-titre { font-size: 13px; font-weight: 700; }
  .badge {
    background: var(--orange); color: var(--blanc);
    font-size: 11px; font-weight: 700;
    padding: 2px 10px; border-radius: 100px;
  }
  .liste { display: flex; flex-direction: column; gap: 8px; }
  .tx {
    background: var(--gf); border: 1px solid #222; border-radius: 10px;
    padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
  }
  .tx-g { display: flex; gap: 10px; align-items: center; }
  .tx-ico {
    width: 38px; height: 38px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  .ico-r { background: rgba(244,67,54,0.1); }
  .ico-d { background: rgba(76,175,80,0.1); }
  .tx-nom { font-size: 14px; font-weight: 600; }
  .tx-info { font-size: 11px; color: var(--gt); margin-top: 2px; }
  .tx-d { text-align: right; }
  .tx-montant { font-size: 15px; font-weight: 700; }
  .m-r { color: var(--rouge); }
  .m-d { color: var(--vert); }
  .tx-heure { font-size: 11px; color: var(--gt); margin-top: 2px; }

  .vide { text-align: center; padding: 40px 20px; color: var(--gt); font-size: 13px; }
  .vide-ico { font-size: 40px; margin-bottom: 10px; }
  .loading { text-align: center; padding: 30px; color: var(--gt); font-size: 13px; }

  /* MODALE */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 200;
    align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--gf); border: 1px solid #333;
    border-radius: 14px; padding: 24px; width: 290px;
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .modal input {
    width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
    padding: 10px 12px; color: var(--blanc); font-size: 14px;
    font-family: 'Inter', sans-serif; margin-bottom: 12px;
  }
  .modal-btns { display: flex; gap: 8px; }
  .btn-ok {
    flex: 1; background: var(--orange); color: var(--blanc); border: none;
    border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .btn-cancel {
    flex: 1; background: #222; color: var(--gt); border: 1px solid #333;
    border-radius: 8px; padding: 10px; font-size: 13px;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }

  @media (max-width: 400px) { .f-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="logo.png" alt="MomoWatch" onerror="this.style.display='none'">
    <div class="nav-titre">Momo<span>Watch</span></div>
  </div>
  <div class="statut"><div class="dot"></div>Actif</div>
</nav>

<div class="page">

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Aujourd'hui</div>
      <div class="stat-val" id="v-jour">—</div>
      <div class="stat-nb" id="n-jour">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Résultat filtré</div>
      <div class="stat-val" id="v-filtre">—</div>
      <div class="stat-nb" id="n-filtre">—</div>
    </div>
  </div>

  <div class="filtres">
    <div class="f-titre">🔍 Filtres</div>
    <div class="f-grid">
      <div class="f-champ">
        <label>Opérateur</label>
        <div class="f-op">
          <select id="operateur"><option value="">Tous</option></select>
          <button class="btn-plus" onclick="ouvrirModal()">+</button>
        </div>
      </div>
      <div class="f-champ">
        <label>Type</label>
        <select id="type">
          <option value="">Tous</option>
          <option value="Retrait">Retrait</option>
          <option value="Dépôt">Dépôt</option>
        </select>
      </div>
      <div class="f-champ">
        <label>Client</label>
        <input type="text" id="client" placeholder="Ex: Moussa">
      </div>
      <div class="f-champ">
        <label>Date</label>
        <input type="date" id="date">
      </div>
    </div>
    <button class="btn-voir" onclick="charger()">Voir les transactions</button>
  </div>

  <div class="liste-header">
    <div class="liste-titre">Transactions</div>
    <div class="badge" id="badge">0</div>
  </div>
  <div class="liste" id="liste"><div class="loading">Chargement...</div></div>

</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Ajouter un opérateur</h3>
    <input type="text" id="inp-op" placeholder="Ex: Orange Money">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
      <button class="btn-ok" onclick="ajouterOp()">Ajouter</button>
    </div>
  </div>
</div>

<script>
  function fmt(n) { return Number(n||0).toLocaleString("fr-FR") + " FCFA"; }
  function fmtDate(s) {
    if (!s) return "";
    const d = new Date(s);
    return d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"});
  }

  function chargerOps() {
    const ops = JSON.parse(localStorage.getItem("ops") || "[]");
    const sel = document.getElementById("operateur");
    const val = sel.value;
    sel.innerHTML = '<option value="">Tous</option>';
    ops.forEach(o => {
      const opt = document.createElement("option");
      opt.value = opt.textContent = o;
      sel.appendChild(opt);
    });
    sel.value = val;
  }

  function ouvrirModal() {
    document.getElementById("overlay").classList.add("show");
    setTimeout(() => document.getElementById("inp-op").focus(), 100);
  }
  function fermerModal() {
    document.getElementById("overlay").classList.remove("show");
    document.getElementById("inp-op").value = "";
  }
  function ajouterOp() {
    const nom = document.getElementById("inp-op").value.trim();
    if (!nom) return;
    const ops = JSON.parse(localStorage.getItem("ops") || "[]");
    if (!ops.includes(nom)) { ops.push(nom); localStorage.setItem("ops", JSON.stringify(ops)); }
    chargerOps();
    fermerModal();
  }

  async function charger(filtre = true) {
    const operateur = filtre ? document.getElementById("operateur").value : "";
    const type      = filtre ? document.getElementById("type").value : "";
    const date      = filtre ? document.getElementById("date").value : "";
    const client    = filtre ? document.getElementById("client").value : "";

    const p = new URLSearchParams();
    if (operateur) p.append("operateur", operateur);
    if (type)      p.append("type", type);
    if (date)      p.append("date", date);
    if (client)    p.append("client", client);

    document.getElementById("liste").innerHTML = '<div class="loading">Chargement...</div>';

    try {
      const r = await fetch(`/api/summary?${p}`);
      const d = await r.json();
      const txs = d.transactions || [];

      document.getElementById("v-filtre").textContent = fmt(d.total_montant);
      document.getElementById("n-filtre").textContent = `${d.nombre_transactions || 0} transaction(s)`;
      document.getElementById("badge").textContent = d.nombre_transactions || 0;

      const liste = document.getElementById("liste");
      if (txs.length === 0) {
        liste.innerHTML = `<div class="vide"><div class="vide-ico">📭</div>Aucune transaction trouvée</div>`;
        return;
      }
      liste.innerHTML = "";
      txs.forEach(t => {
        const ret = t.type === "Retrait";
        const div = document.createElement("div");
        div.className = "tx";
        div.innerHTML = `
          <div class="tx-g">
            <div class="tx-ico ${ret?"ico-r":"ico-d"}">${ret?"📤":"📥"}</div>
            <div>
              <div class="tx-nom">${t.client||"Inconnu"}</div>
              <div class="tx-info">${t.operateur||""} · ${t.type||""}</div>
            </div>
          </div>
          <div class="tx-d">
            <div class="tx-montant ${ret?"m-r":"m-d"}">${ret?"-":"+"}${fmt(t.montant)}</div>
            <div class="tx-heure">${fmtDate(t.date_heure)}</div>
          </div>`;
        liste.appendChild(div);
      });
    } catch(e) {
      document.getElementById("liste").innerHTML =
        `<div class="vide"><div class="vide-ico">⚠️</div>Erreur — vérifie les clés Supabase dans Vercel</div>`;
    }
  }

  async function chargerJour() {
    const auj = new Date().toISOString().split("T")[0];
    try {
      const r = await fetch(`/api/summary?date=${auj}`);
      const d = await r.json();
      document.getElementById("v-jour").textContent = fmt(d.total_montant);
      document.getElementById("n-jour").textContent = `${d.nombre_transactions||0} transaction(s)`;
    } catch(e) {
      document.getElementById("v-jour").textContent = "—";
    }
  }

  // Fermer modale en cliquant dehors
  document.getElementById("overlay").addEventListener("click", function(e) {
    if (e.target === this) fermerModal();
  });

  // Init
  chargerOps();
  chargerJour();
  charger();
</script>
</body>
</html>
