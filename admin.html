<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#FF7900">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MomoWatch">
<title>MomoWatch — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #FF7900; --noir: #0E0E0E; --gf: #1A1A1A; --gm: #2A2A2A;
    --gt: #9A9A9A; --blanc: #FFFFFF; --vert: #4CAF50; --rouge: #F44336;
  }
  body { font-family: 'Inter', sans-serif; background: var(--noir); color: var(--blanc); min-height: 100vh; padding: 20px; }

  /* ÉCRAN CONNEXION */
  #ecran-connexion {
    min-height: 90vh; display: flex; align-items: center; justify-content: center;
  }
  .carte-connexion {
    background: var(--gf); border: 1px solid #222; border-radius: 16px;
    max-width: 360px; width: 100%; padding: 32px 28px; text-align: center;
  }
  .carte-connexion h1 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  .carte-connexion input {
    width: 100%; background: var(--gm); border: 1px solid #333; border-radius: 10px;
    padding: 12px 14px; color: var(--blanc); font-size: 15px; font-family: inherit; margin-bottom: 14px;
  }
  .carte-connexion input:focus { outline: none; border-color: var(--orange); }

  /* ÉCRAN ADMIN */
  #ecran-admin { display: none; max-width: 900px; margin: 0 auto; }
  h1.titre { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
  h1.titre span { color: var(--orange); }

  .bloc { background: var(--gf); border: 1px solid #222; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .bloc h2 { font-size: 15px; margin-bottom: 14px; }

  select, button {
    background: var(--gm); border: 1px solid #333; border-radius: 10px;
    padding: 10px 14px; color: var(--blanc); font-size: 14px; font-family: inherit;
  }
  button.principal { background: var(--orange); border: none; font-weight: 700; cursor: pointer; }
  button.principal:disabled { opacity: 0.6; }

  .resultat-code {
    margin-top: 14px; padding: 12px 14px; background: var(--gm); border-radius: 10px;
    font-family: monospace; font-size: 16px; color: var(--orange); font-weight: 700;
    display: none;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #222; white-space: nowrap; }
  th { color: var(--gt); font-weight: 600; }
  .tag { padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .tag.disponible { background: #2A2A2A; color: var(--gt); }
  .tag.actif { background: rgba(76,175,80,0.15); color: var(--vert); }
  .tag.expire { background: rgba(244,67,54,0.15); color: var(--rouge); }

  .table-scroll { overflow-x: auto; }
  .msg { margin-top: 10px; font-size: 13px; }
  .msg.erreur { color: var(--rouge); }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 200;
    align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--gf); border: 1px solid var(--gm);
    border-radius: 14px; padding: 24px; width: 290px;
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .modal input, .modal select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--gm); background: var(--noir); color: var(--blanc);
  }
  .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
  .btn-cancel, .btn-ok {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    font-weight: 700; cursor: pointer; font-size: 13px;
  }
  .btn-cancel { background: var(--gm); color: var(--blanc); }
  .btn-ok { background: var(--orange); color: var(--blanc); }
</style>
</head>
<body>

<div id="ecran-connexion">
  <div class="carte-connexion">
    <h1>🔒 Accès admin MomoWatch</h1>
    <input type="password" id="champ-mdp" placeholder="Mot de passe">
    <button class="principal" style="width:100%;padding:12px;" onclick="connexion()">Entrer</button>
    <div class="msg erreur" id="msg-connexion"></div>
  </div>
</div>

<div id="ecran-admin">
  <h1 class="titre">Momo<span>Watch</span> — Admin</h1>

  <div class="bloc">
    <h2>Générer un nouveau code d'activation</h2>
    <select id="duree-select">
      <option value="30">1 mois</option>
      <option value="90">3 mois</option>
      <option value="365">12 mois</option>
    </select>
    <button class="principal" id="btn-generer" onclick="genererCode()">Générer</button>
    <div class="resultat-code" id="resultat-code"></div>
    <div id="bloc-whatsapp" style="display:none;margin-top:14px;">
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input id="indicatifWhatsapp" type="text" value="226" placeholder="Indicatif"
               style="width:70px;padding:10px 8px;border-radius:8px;border:1px solid #2A2A2A;
                      background:#0E0E0E;color:#fff;text-align:center;">
        <input id="telWhatsapp" type="tel" placeholder="Numéro du client (ex: 70123456)"
               style="flex:1;padding:10px 12px;border-radius:8px;border:1px solid #2A2A2A;
                      background:#0E0E0E;color:#fff;">
      </div>
      <div style="color:#6A6A6A;font-size:11px;margin-bottom:8px;">
        Client hors Burkina ? Change l'indicatif (ex: 225 Côte d'Ivoire, 221 Sénégal, 223 Mali)
      </div>
      <button id="btnEnvoyerWhatsapp" style="width:100%;padding:10px;border:none;border-radius:8px;
              background:#25D366;color:#fff;font-weight:700;cursor:pointer;">Envoyer par WhatsApp</button>
    </div>
  </div>

  <div class="bloc">
    <h2>Tous les codes</h2>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Code</th><th>Durée</th><th>Statut</th><th>Boutique</th><th>DG</th><th>Téléphone</th><th>Expire le</th><th>ID boutique</th><th>Renouveler</th>
          </tr>
        </thead>
        <tbody id="corps-table">
          <tr><td colspan="9">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="overlay" id="overlayRenouv">
  <div class="modal">
    <h3 id="renouv-titre">Renouveler</h3>
    <select id="renouv-duree" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2A2A2A;
            background:#0E0E0E;color:#fff;margin-bottom:10px;">
      <option value="30">1 mois</option>
      <option value="90">3 mois</option>
      <option value="365">12 mois</option>
    </select>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input type="text" id="renouv-indicatif" placeholder="Indicatif"
             style="width:70px;padding:10px 8px;border-radius:8px;border:1px solid #2A2A2A;
                    background:#0E0E0E;color:#fff;text-align:center;">
      <input type="tel" id="renouv-numero" placeholder="Numéro"
             style="flex:1;padding:10px 12px;border-radius:8px;border:1px solid #2A2A2A;
                    background:#0E0E0E;color:#fff;">
    </div>
    <div id="renouv-erreur" style="color:#F44336;font-size:13px;margin-bottom:8px;display:none;"></div>
    <div id="renouv-resultat" style="color:#FF7900;font-family:monospace;font-size:14px;
         margin-bottom:8px;display:none;text-align:center;"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fermerRenouvellementLigne()">Fermer</button>
      <button class="btn-ok" id="btnGenererEtEnvoyer">Générer & Envoyer</button>
    </div>
  </div>
</div>

<script>
  let MOT_DE_PASSE = sessionStorage.getItem("admin_mdp") || "";

  if (MOT_DE_PASSE) {
    verifierEtEntrer();
  }

  async function connexion() {
    const mdp = document.getElementById("champ-mdp").value.trim();
    if (!mdp) return;
    MOT_DE_PASSE = mdp;
    await verifierEtEntrer();
  }

  async function verifierEtEntrer() {
    try {
      const r = await fetch(`/api/admin_liste?mot_de_passe=${encodeURIComponent(MOT_DE_PASSE)}`);
      const d = await r.json();
      if (!d.succes) {
        document.getElementById("msg-connexion").textContent = d.message || "Mot de passe incorrect";
        sessionStorage.removeItem("admin_mdp");
        return;
      }
      sessionStorage.setItem("admin_mdp", MOT_DE_PASSE);
      document.getElementById("ecran-connexion").style.display = "none";
      document.getElementById("ecran-admin").style.display = "block";
      afficherCodes(d.codes);
    } catch (e) {
      document.getElementById("msg-connexion").textContent = "Erreur de connexion";
    }
  }

  function fmtDate(d) {
    if (!d) return "—";
    return new Date(d).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
  }

  function dureeLabel(j) {
    if (j === 30) return "1 mois";
    if (j === 90) return "3 mois";
    if (j === 365) return "12 mois";
    return j + " jours";
  }

  function afficherCodes(codes) {
    const corps = document.getElementById("corps-table");
    if (!codes || codes.length === 0) {
      corps.innerHTML = "<tr><td colspan='9'>Aucun code pour l'instant</td></tr>";
      return;
    }

    // Repère les noms de boutique en double (affichage uniquement, ne touche pas aux données)
    // et attribue un suffixe (2), (3)... par boutique_id, dans l'ordre chronologique d'activation.
    const parOrdreAsc = [...codes].reverse(); // codes arrive du plus récent au plus ancien
    const compteurParNom = {};
    const suffixeParBoutiqueId = {};
    parOrdreAsc.forEach(c => {
      const nom = (c.boutiques || {}).nom_boutique;
      const id = c.boutique_id;
      if (!nom || !id || suffixeParBoutiqueId[id]) return;
      compteurParNom[nom] = (compteurParNom[nom] || 0) + 1;
      suffixeParBoutiqueId[id] = compteurParNom[nom];
    });

    corps.innerHTML = codes.map(c => {
      let statutTag = "disponible";
      let statutTexte = "Disponible";
      if (c.statut === "actif") {
        const expire = c.date_expiration ? new Date(c.date_expiration) : null;
        if (expire && expire < new Date()) {
          statutTag = "expire"; statutTexte = "Expiré";
        } else {
          statutTag = "actif"; statutTexte = "Actif";
        }
      }
      const boutique = c.boutiques || {};
      const rang = suffixeParBoutiqueId[c.boutique_id] || 1;
      const nomAffiche = boutique.nom_boutique
        ? boutique.nom_boutique + (rang > 1 ? ` (${rang})` : "")
        : "—";
      return `<tr>
        <td style="font-family:monospace;color:var(--orange);">${c.code}</td>
        <td>${dureeLabel(c.duree_jours)}</td>
        <td><span class="tag ${statutTag}">${statutTexte}</span></td>
        <td>${nomAffiche}</td>
        <td>${boutique.nom_dg || "—"}</td>
        <td>${boutique.telephone || "—"}</td>
        <td>${fmtDate(c.date_expiration)}</td>
        <td style="font-family:monospace;font-size:11px;cursor:pointer;"
            title="Cliquer pour copier"
            onclick="navigator.clipboard.writeText('${c.boutique_id || ""}')">${c.boutique_id ? c.boutique_id.slice(0,8) + "…" : "—"}</td>
        <td>${c.boutique_id ? `<button class="btn-renouv-ligne"
              data-boutique-id="${c.boutique_id}"
              data-nom-boutique="${(boutique.nom_boutique || "").replace(/"/g, '&quot;')}"
              data-telephone="${boutique.telephone || ""}"
              style="padding:6px 10px;border:none;border-radius:6px;background:#25D366;
                     color:#fff;font-weight:700;cursor:pointer;font-size:11px;">📱 Renouveler</button>` : "—"}</td>
      </tr>`;
    }).join("");

    document.querySelectorAll(".btn-renouv-ligne").forEach(btn => {
      btn.addEventListener("click", () => ouvrirRenouvellementLigne(
        btn.dataset.boutiqueId, btn.dataset.nomBoutique, btn.dataset.telephone
      ));
    });
  }

  const LABEL_DUREE_WA = {30: '1 mois', 90: '3 mois', 365: '12 mois'};
  let dernierCodeGenere = '';
  let derniereDureeGeneree = 30;

  async function genererCode() {
    const btn = document.getElementById("btn-generer");
    const duree = parseInt(document.getElementById("duree-select").value);
    btn.disabled = true;
    btn.textContent = "Génération...";

    try {
      const r = await fetch("/api/admin_generer_code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mot_de_passe: MOT_DE_PASSE, duree_jours: duree })
      });
      const d = await r.json();
      if (d.succes) {
        const zone = document.getElementById("resultat-code");
        zone.style.display = "block";
        zone.textContent = "✅ " + d.code;
        dernierCodeGenere = d.code;
        derniereDureeGeneree = duree;
        document.getElementById("telWhatsapp").value = "";
        document.getElementById("bloc-whatsapp").style.display = "block";
        rafraichirListe();
      } else {
        alert(d.message || "Erreur");
      }
    } catch (e) {
      alert("Erreur de connexion");
    } finally {
      btn.disabled = false;
      btn.textContent = "Générer";
    }
  }

  document.getElementById("btnEnvoyerWhatsapp").addEventListener("click", () => {
    if (!dernierCodeGenere) return;
    const indicatif = document.getElementById("indicatifWhatsapp").value.replace(/[^0-9]/g, "");
    const numero = document.getElementById("telWhatsapp").value.replace(/[^0-9]/g, "");
    if (!indicatif || !numero) return;
    const tel = indicatif + numero;
    const message = `Bonjour, voici votre code d'activation MomoWatch (${LABEL_DUREE_WA[derniereDureeGeneree] || ""}) : ${dernierCodeGenere}`;
    window.open(`https://wa.me/${tel}?text=${encodeURIComponent(message)}`, "_blank");
  });

  async function rafraichirListe() {
    const r = await fetch(`/api/admin_liste?mot_de_passe=${encodeURIComponent(MOT_DE_PASSE)}`);
    const d = await r.json();
    if (d.succes) afficherCodes(d.codes);
  }

  // ── Renouvellement par ligne (boutique existante) ──────────────
  let renouvContexte = null; // { boutiqueId, nomBoutique, telephone }

  function ouvrirRenouvellementLigne(boutiqueId, nomBoutique, telephone) {
    renouvContexte = { boutiqueId, nomBoutique, telephone };
    document.getElementById("renouv-titre").textContent =
      `Renouveler : ${nomBoutique || "boutique"}`;
    document.getElementById("renouv-indicatif").value = "226";
    document.getElementById("renouv-numero").value = (telephone || "").replace(/[^0-9]/g, "");
    document.getElementById("renouv-erreur").style.display = "none";
    document.getElementById("renouv-resultat").style.display = "none";
    document.getElementById("overlayRenouv").classList.add("show");
  }
  function fermerRenouvellementLigne() {
    document.getElementById("overlayRenouv").classList.remove("show");
  }

  document.getElementById("btnGenererEtEnvoyer").addEventListener("click", async () => {
    if (!renouvContexte) return;
    const duree = parseInt(document.getElementById("renouv-duree").value, 10);
    const erreurEl = document.getElementById("renouv-erreur");
    erreurEl.style.display = "none";
    const btn = document.getElementById("btnGenererEtEnvoyer");
    btn.disabled = true; btn.textContent = "Génération...";

    try {
      const r = await fetch("/api/admin_generer_code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mot_de_passe: MOT_DE_PASSE, duree_jours: duree })
      });
      const d = await r.json();
      btn.disabled = false; btn.textContent = "Générer & Envoyer";

      if (!d.succes) {
        erreurEl.textContent = d.message || "Erreur";
        erreurEl.style.display = "block";
        return;
      }

      const indicatif = document.getElementById("renouv-indicatif").value.replace(/[^0-9]/g, "");
      const numero = document.getElementById("renouv-numero").value.replace(/[^0-9]/g, "");
      const resultatEl = document.getElementById("renouv-resultat");
      resultatEl.textContent = "✅ " + d.code;
      resultatEl.style.display = "block";

      if (indicatif && numero) {
        const tel = indicatif + numero;
        const message = `Bonjour ${renouvContexte.nomBoutique}, voici votre code de renouvellement `
          + `MomoWatch (${LABEL_DUREE_WA[duree] || ""}) : ${d.code}. `
          + `Entrez-le dans votre application pour renouveler votre abonnement.`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(message)}`, "_blank");
      }

      rafraichirListe();
    } catch (e) {
      btn.disabled = false; btn.textContent = "Générer & Envoyer";
      erreurEl.textContent = "Erreur réseau";
      erreurEl.style.display = "block";
    }
  });

  document.getElementById("overlayRenouv").addEventListener("click", function(e) {
    if (e.target === this) fermerRenouvellementLigne();
  });
</script>

</body>
</html>
